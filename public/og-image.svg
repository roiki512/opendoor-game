<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37d67a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#37d67a" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#06090f"/>

  <!-- Grid horizontal -->
  <g stroke="#0c1522" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>

  <!-- Grid vertical -->
  <g stroke="#0c1522" stroke-width="1">
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Chart fill -->
  <polygon
    points="60,582 200,565 340,555 460,528 570,498 680,462 790,415 880,370 960,318 1040,262 1120,202 1160,175 1160,620 60,620"
    fill="url(#chartFill)"/>

  <!-- Chart line -->
  <polyline
    points="60,582 200,565 340,555 460,528 570,498 680,462 790,415 880,370 960,318 1040,262 1120,202 1160,175"
    fill="none" stroke="#37d67a" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Milestone dots -->
  <g fill="#ffd84d" stroke="#06090f" stroke-width="2">
    <circle cx="340" cy="555" r="6"/>
    <circle cx="570" cy="498" r="6"/>
    <circle cx="790" cy="415" r="6"/>
    <circle cx="960" cy="318" r="6"/>
    <circle cx="1120" cy="202" r="7"/>
  </g>

  <!-- Pixel house on chart (at 790,415) -->
  <polygon points="776,385 793,365 810,385" fill="#2b4a6f" stroke="#26354a" stroke-width="1.5"/>
  <rect x="776" y="385" width="34" height="28" fill="#f3eee4" stroke="#26354a" stroke-width="1.5"/>
  <rect x="785" y="396" width="10" height="17" fill="#10161f"/>
  <rect x="779" y="396" width="9" height="16" fill="#1c85e8"/>
  <rect x="797" y="388" width="8" height="8" fill="#ffd84d" stroke="#26354a" stroke-width="1"/>

  <!-- FASTER lightning bolt -->
  <text x="852" y="378" font-family="'Courier New','Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="20" fill="#ffd84d" opacity="0.9">⚡</text>

  <!-- Title glow layer -->
  <text x="600" y="168" text-anchor="middle"
        font-family="'Courier New','Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="104" font-weight="bold" fill="#ffd84d" opacity="0.22"
        filter="url(#titleGlow)">$OPEN: FASTER</text>

  <!-- Title -->
  <text x="600" y="168" text-anchor="middle"
        font-family="'Courier New','Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="104" font-weight="bold" fill="#ffd84d">$OPEN: FASTER</text>

  <!-- Tagline -->
  <text x="600" y="218" text-anchor="middle"
        font-family="'Courier New','Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="26" fill="#c9d8ea" letter-spacing="3">DODGE THE SHORTS. CLIMB TO ATH.</text>

  <!-- Lives / earnings reports -->
  <g fill="#37d67a" opacity="0.9">
    <rect x="516" y="238" width="14" height="14" rx="2"/>
    <rect x="537" y="238" width="14" height="14" rx="2"/>
    <rect x="558" y="238" width="14" height="14" rx="2"/>
  </g>
  <text x="580" y="250" font-family="'Courier New','Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="14" fill="#5fa8d8" opacity="0.8">3 EARNINGS REPORTS</text>

  <!-- Start price label -->
  <text x="60" y="612" text-anchor="middle"
        font-family="'Courier New','Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="19" fill="#5fa8d8">$0.51</text>

  <!-- End label -->
  <text x="1160" y="160"
        font-family="'Courier New','Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="20" fill="#37d67a" text-anchor="middle">$82+</text>

  <!-- URL bar at bottom -->
  <rect x="0" y="595" width="1200" height="35" fill="#080e18" opacity="0.9"/>
  <text x="600" y="619" text-anchor="middle"
        font-family="'Courier New','Liberation Mono','DejaVu Sans Mono',monospace"
        font-size="20" fill="#5fa8d8">roiki512.github.io/opendoor-game</text>
</svg>
